version: "3.8"

services:
  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: podcraft_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL (optional - can use SQLite instead)
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: podcraft_postgres
  #   environment:
  #     POSTGRES_USER: ${DB_USER:-podcraft}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-podcraft123}
  #     POSTGRES_DB: ${DB_NAME:-podcraft}
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-podcraft}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: podcraft_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      # - DATABASE_URL=postgresql://${DB_USER:-podcraft}:${DB_PASSWORD:-podcraft123}@postgres:5432/${DB_NAME:-podcraft}
      - DATABASE_URL=sqlite:///app/dev.db
    volumes:
      - ./backend:/app
      - backend_static:/app/static
    depends_on:
      redis:
        condition: service_healthy
      # postgres:
      #   condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: podcraft_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - ./frontend/.env
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:${BACKEND_PORT:-8000}
      - NEXT_PUBLIC_WS_BASE_URL=ws://localhost:${BACKEND_PORT:-8000}
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: podcraft_celery_worker
    command: celery -A app.celery_app worker -l info -Q default,cleanup -c 4
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      # - DATABASE_URL=postgresql://${DB_USER:-podcraft}:${DB_PASSWORD:-podcraft123}@postgres:5432/${DB_NAME:-podcraft}
      - DATABASE_URL=sqlite:///app/dev.db
    volumes:
      - ./backend:/app
      - backend_static:/app/static
    depends_on:
      - redis
      - backend
    restart: unless-stopped

  # Celery Beat (scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: podcraft_celery_beat
    command: celery -A app.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      # - DATABASE_URL=postgresql://${DB_USER:-podcraft}:${DB_PASSWORD:-podcraft123}@postgres:5432/${DB_NAME:-podcraft}
      - DATABASE_URL=sqlite:///app/dev.db
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - backend
    restart: unless-stopped

  # Nginx (reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: podcraft_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      # - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  # postgres_data:
  backend_static:

networks:
  default:
    name: podcraft_network
