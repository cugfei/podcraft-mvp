# Docker Compose override for local development
# This file is automatically loaded by Docker Compose
# It adds volume mounts for hot-reload during development

version: "3.8"

services:
  backend:
    # Override command for development (auto-reload)
    command: sh -c "pip install -e. && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      # Mount source code for hot-reload
      - ./backend:/app:rw
      - ./backend/dev.db:/app/dev.db:rw
      - backend_static:/app/static:rw
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
        - action: rebuild
          path: ./backend/requirements.txt

  frontend:
    # Override command for development (hot reload)
    command: pnpm run dev
    volumes:
      # Mount source code for hot-reload
      - ./frontend:/app:rw
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
        - action: rebuild
          path: ./frontend/package.json

  celery_worker:
    # Override command for development (auto-reload)
    command: celery -A app.celery_app worker -l debug -Q default,cleanup -c 2 --autoreload
    volumes:
      - ./backend:/app:rw
      - backend_static:/app/static:rw
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG

  redis:
    # Use non-empty password for development
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword}

  nginx:
    # Disable Nginx for local development (access services directly)
    profiles:
      - production-only
